<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Método Grez - Plan Detox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen m-0">

    <div id="header-app"></div>

    <main class="flex-1 w-full max-w-4xl mx-auto p-4">
        
        <div class="grid grid-cols-3 gap-2 md:gap-4 mb-6 md:mb-8">
            <div class="card-metrica">
                <p class="etiqueta-metrica">Inicial</p>
                <p id="pesoInicial" class="valor-metrica">-- kg</p>
            </div>
            <div class="card-metrica">
                <p class="etiqueta-metrica">Actual</p>
                <p id="pesoActual" class="valor-metrica">-- kg</p>
            </div>
            <div class="card-metrica bg-blue-highlight">
                <p class="etiqueta-metrica text-white">Perdidos</p>
                <p id="kilosPerdidos" class="valor-metrica text-white">-- kg</p>
            </div>
        </div>

        <section id="seguimiento" class="bg-white p-4 md:p-6 rounded-2xl shadow-md mb-6 md:mb-8">
            <h2 class="titulo-seccion">📈 Control de Peso Diario</h2>
            <div class="chart-container">
                <canvas id="weightChart"></canvas>
            </div>
        </section>

        <h2 class="titulo-seccion">📅 Menú Diario</h2>
        <div class="scroll-container">
            <div id="calendarGrid" class="flex gap-4"></div>
        </div>
        
    </main>

    <div id="footer-app"></div>

    <script src="script.js"></script>
</body>
</html>
